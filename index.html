<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Garden CQB - Nasa</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; touch-action: none; }
        
        /* UI Stats */
        #gui {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.5);
            padding: 10px; border-radius: 8px; pointer-events: none;
        }

        /* Virtual Joystick */
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px;
            background: white; border-radius: 50%;
            transition: transform 0.1s;
        }

        /* Action Button (Style Roblox Mobile) */
        #action-btn {
            position: absolute; bottom: 60px; right: 40px;
            width: 80px; height: 80px;
            background: rgba(0,162,255,0.8);
            border: 4px solid white; border-radius: 50%;
            color: white; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #action-btn:active { transform: scale(0.9); background: #005A8E; }
    </style>
</head>
<body>
    <div id="gui">
        <b>Kebun Nasa 3D (Mobile)</b><br>
        Uang: $<span id="money">0</span>
    </div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <div id="action-btn">AKSI</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
